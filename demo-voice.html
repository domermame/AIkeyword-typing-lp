<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>音声読み上げデモ — キーワードタイピング練習アプリ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #ffffff;
      --color-bg-secondary: #f5f4f0;
      --color-bg-info: #e6f1fb;
      --color-text-primary: #1a1a18;
      --color-text-secondary: #5f5e5a;
      --color-text-info: #185fa5;
      --color-border: rgba(0,0,0,0.12);
      --color-border-md: rgba(0,0,0,0.22);
      --color-purple-bg: #eeedfe;
      --color-purple: #534ab7;
      --color-teal-bg: #e1f5ee;
      --color-teal: #0f6e56;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #1c1c1a;
        --color-bg-secondary: #252523;
        --color-bg-info: #042c53;
        --color-text-primary: #f0ede8;
        --color-text-secondary: #b4b2a9;
        --color-text-info: #85b7eb;
        --color-border: rgba(255,255,255,0.12);
        --color-border-md: rgba(255,255,255,0.22);
        --color-purple-bg: #26215c;
        --color-purple: #afa9ec;
        --color-teal-bg: #04342c;
        --color-teal: #5dcaa5;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--color-bg);
      color: var(--color-text-primary);
      font-size: 16px;
      line-height: 1.7;
    }

    .container { max-width: 680px; margin: 0 auto; padding: 0 1.5rem 4rem; }

    /* ---- Header ---- */
    .page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 1.5rem 0 2rem;
      border-bottom: 0.5px solid var(--color-border);
      margin-bottom: 2rem;
    }
    .back-link {
      color: var(--color-text-secondary);
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .back-link:hover { color: var(--color-text-primary); }
    .page-header h1 { font-size: 1.2rem; font-weight: 500; }
    .badge-voice {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--color-teal-bg);
      color: var(--color-teal);
      font-size: 12px;
      padding: 3px 10px;
      border-radius: var(--radius-md);
      margin-left: auto;
    }

    /* ---- Step labels ---- */
    .step-label {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .step-num {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--color-purple-bg);
      color: var(--color-purple);
      font-size: 11px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ---- Keyword input ---- */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 0.5rem;
    }
    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--color-border-md);
      background: var(--color-bg);
      color: var(--color-text-primary);
      font-size: 15px;
      outline: none;
    }
    .input-row input:focus { border-color: var(--color-purple); }
    .btn-generate {
      padding: 10px 20px;
      background: var(--color-purple);
      color: var(--color-purple-bg);
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-generate:hover { opacity: 0.88; }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ---- Error / Credit ---- */
    .demo-error {
      display: none;
      background: var(--color-bg-secondary);
      border: 0.5px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 8px 12px;
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-bottom: 1rem;
    }
    .wiki-credit {
      display: none;
      font-size: 11px;
      color: var(--color-text-secondary);
      text-align: right;
      margin-bottom: 0.75rem;
    }
    .wiki-credit a { color: var(--color-text-secondary); }

    /* ---- Generated text box ---- */
    .text-box {
      background: var(--color-bg-secondary);
      border: 0.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      font-size: 15px;
      line-height: 1.9;
      margin-bottom: 1rem;
      min-height: 6rem;
      color: var(--color-text-secondary);
    }
    .text-box .spoken   { color: var(--color-text-secondary); opacity: 0.5; }
    .text-box .speaking { background: var(--color-teal); color: #ffffff; border-radius: 3px; padding: 1px 2px; }
    .text-box .unspoken { color: var(--color-text-primary); }

    /* ---- Voice controls ---- */
    .voice-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .btn-play {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--color-teal);
      color: var(--color-teal-bg);
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
    }
    .btn-play:hover { opacity: 0.88; }
    .btn-play:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-stop {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: transparent;
      color: var(--color-text-secondary);
      border: 0.5px solid var(--color-border-md);
      border-radius: var(--radius-md);
      font-size: 14px;
      cursor: pointer;
    }
    .btn-stop:hover { background: var(--color-bg-secondary); }
    .status-badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: var(--radius-md);
      background: var(--color-bg-secondary);
      color: var(--color-text-secondary);
      border: 0.5px solid var(--color-border);
    }
    .status-badge.playing {
      background: var(--color-teal-bg);
      color: var(--color-teal);
      border-color: transparent;
    }

    /* ---- Speed buttons ---- */
    .speed-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.5rem;
    }
    .speed-label {
      font-size: 13px;
      color: var(--color-text-secondary);
      flex-shrink: 0;
    }
    .speed-btns { display: flex; gap: 6px; }
    .speed-btn {
      padding: 6px 14px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--color-border-md);
      background: transparent;
      color: var(--color-text-secondary);
      font-size: 13px;
      cursor: pointer;
    }
    .speed-btn:hover { background: var(--color-bg-secondary); }
    .speed-btn.active {
      background: var(--color-teal-bg);
      color: var(--color-teal);
      border-color: transparent;
      font-weight: 500;
    }

    /* ---- Typing area ---- */
    #typing-box {
      width: 100%;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--color-border-md);
      background: var(--color-bg);
      color: var(--color-text-primary);
      font-size: 15px;
      font-family: inherit;
      line-height: 1.7;
      resize: none;
      outline: none;
      margin-bottom: 0.75rem;
    }
    #typing-box:focus { border-color: var(--color-purple); }

    /* ---- Action buttons row (再挑戦 / 新しい問題 / 入力終了) ---- */
    .action-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .btn-retry {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      background: transparent;
      color: var(--color-text-secondary);
      border: 0.5px solid var(--color-border-md);
      border-radius: var(--radius-md);
      font-size: 14px;
      cursor: pointer;
    }
    .btn-retry:hover { background: var(--color-bg-secondary); }
    .btn-retry:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-new {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      background: transparent;
      color: var(--color-text-secondary);
      border: 0.5px solid var(--color-border-md);
      border-radius: var(--radius-md);
      font-size: 14px;
      cursor: pointer;
    }
    .btn-new:hover { background: var(--color-bg-secondary); }
    .btn-new:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-finish {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      background: var(--color-purple);
      color: var(--color-purple-bg);
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
      margin-left: auto;
    }
    .btn-finish:hover { opacity: 0.88; }
    .btn-finish:disabled { opacity: 0.4; cursor: not-allowed; }
    .hint-enter {
      font-size: 11px;
      color: var(--color-text-secondary);
    }

    /* ---- Stats ---- */
    .stats { display: flex; gap: 10px; margin-bottom: 2rem; }
    .stat {
      flex: 1;
      background: var(--color-bg-secondary);
      border-radius: var(--radius-md);
      padding: 10px 8px;
      text-align: center;
      border: 0.5px solid var(--color-border);
    }
    .stat .val { font-size: 20px; font-weight: 500; }
    .stat .lbl { font-size: 10px; color: var(--color-text-secondary); margin-top: 2px; }
    .stat.finished { border-color: var(--color-purple); background: var(--color-purple-bg); }
    .stat.finished .val { color: var(--color-purple); }

    /* ---- Tip box ---- */
    .tip {
      background: var(--color-bg-info);
      border-radius: var(--radius-md);
      padding: 1rem 1.25rem;
      font-size: 13px;
      color: var(--color-text-info);
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .tip i { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

    .divider { height: 0.5px; background: var(--color-border); margin: 2rem 0; }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="page-header">
    <a class="back-link" href="index.html"><i class="ti ti-arrow-left"></i> トップに戻る</a>
    <h1>音声読み上げデモ</h1>
    <span class="badge-voice"><i class="ti ti-volume"></i> 音声あり</span>
  </div>

  <!-- Step 1: キーワード入力 -->
  <div class="step-label"><span class="step-num">1</span> キーワードを入力して練習文を生成</div>
  <div class="input-row">
    <input type="text" id="kw-input" placeholder="例：要約筆記、バリアフリー、人工知能…" onkeydown="if(event.key==='Enter')generateText()" />
    <button class="btn-generate" id="btn-generate" onclick="generateText()">
      <i class="ti ti-sparkles" aria-hidden="true"></i> 生成
    </button>
  </div>
  <div class="demo-error" id="demo-error"></div>
  <div class="wiki-credit" id="wiki-credit"></div>

  <!-- Generated text -->
  <div class="step-label"><span class="step-num">2</span> 生成された練習文を音声で聴く</div>
  <div class="text-box" id="text-box">
    キーワードを入力して「生成」を押すと、練習文がここに表示されます。
  </div>

  <!-- Voice controls -->
  <div class="voice-controls">
    <button class="btn-play" id="btn-play" onclick="startSpeech()" disabled>
      <i class="ti ti-player-play" aria-hidden="true"></i> 読み上げ開始
    </button>
    <button class="btn-stop" onclick="stopSpeech()">
      <i class="ti ti-player-stop" aria-hidden="true"></i> 停止
    </button>
    <span class="status-badge" id="status-badge">待機中</span>
  </div>

  <!-- Speed buttons -->
  <div class="speed-row">
    <span class="speed-label"><i class="ti ti-gauge" aria-hidden="true"></i> 読み上げ速度</span>
    <div class="speed-btns">
      <button class="speed-btn" data-rate="0.5" onclick="setSpeed(this)">遅い</button>
      <button class="speed-btn active" data-rate="0.7" onclick="setSpeed(this)">やや遅い</button>
      <button class="speed-btn" data-rate="0.9" onclick="setSpeed(this)">ふつう</button>
      <button class="speed-btn" data-rate="1.1" onclick="setSpeed(this)">やや速い</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Step 3: タイピング -->
  <div class="step-label"><span class="step-num">3</span> 聴きながら入力練習</div>
  <textarea id="typing-box" rows="4" placeholder="ここに入力" oninput="updateStats()"></textarea>

  <!-- Action buttons -->
  <div class="action-row">
    <button class="btn-retry" id="btn-retry" onclick="retryTyping()" disabled>
      <i class="ti ti-refresh" aria-hidden="true"></i> 再挑戦
    </button>
    <button class="btn-new" id="btn-new" onclick="generateText()" disabled>
      <i class="ti ti-plus" aria-hidden="true"></i> 新しい問題
    </button>
    <span class="hint-enter">Enter で終了</span>
    <button class="btn-finish" id="btn-finish" onclick="finishTyping()" disabled>
      <i class="ti ti-check" aria-hidden="true"></i> 入力終了
    </button>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat" id="s-chars"><div class="val" id="stat-chars">0</div><div class="lbl">入力文字数</div></div>
    <div class="stat" id="s-rate"><div class="val" id="stat-rate">—</div><div class="lbl">入力率</div></div>
    <div class="stat" id="s-wpm"><div class="val" id="stat-wpm">—</div><div class="lbl">文字/分</div></div>
    <div class="stat" id="s-time"><div class="val" id="stat-time">0:00</div><div class="lbl">経過時間</div></div>
  </div>

  <!-- Tip -->
  <div class="tip">
    <i class="ti ti-info-circle" aria-hidden="true"></i>
    <span>音声読み上げにはブラウザ内蔵の音声合成を使用しています。「遅い」設定で聴きながら入力すると、要約筆記の本番練習に近い環境が作れます。速度は読み上げ前に選んでください。</span>
  </div>

</div>

<script>
  let currentText = '';
  let currentRate = 0.7;
  let startTime = null;
  let timerInterval = null;
  let finished = false;

  /* ---- Wikipedia API ---- */
  async function generateText() {
    const kw = document.getElementById('kw-input').value.trim();
    if (!kw) return;

    const btn = document.getElementById('btn-generate');
    const errBox = document.getElementById('demo-error');
    const credit = document.getElementById('wiki-credit');

    btn.innerHTML = '取得中…';
    btn.disabled = true;
    errBox.style.display = 'none';
    credit.style.display = 'none';
    document.getElementById('text-box').textContent = 'Wikipediaから記事を取得しています…';
    stopSpeech();
    resetStats();

    try {
      const result = await fetchWikipedia(kw);
      currentText = result.text;
      document.getElementById('text-box').textContent = currentText;

      const note = result.redirected
        ? '「' + kw + '」→「' + result.title + '」にリダイレクト&ensp;|&ensp;'
        : '';
      credit.innerHTML = note + '出典: <a href="https://ja.wikipedia.org/wiki/'
        + encodeURIComponent(result.title) + '" target="_blank" rel="noopener">Wikipedia「'
        + result.title + '」</a>';
      credit.style.display = 'block';

      document.getElementById('btn-play').disabled = false;
      document.getElementById('btn-retry').disabled = false;
      document.getElementById('btn-new').disabled = false;
      document.getElementById('btn-finish').disabled = false;
      document.getElementById('typing-box').value = '';
    } catch (e) {
      errBox.textContent = e.message;
      errBox.style.display = 'block';
      document.getElementById('text-box').textContent = 'キーワードを入力して「生成」を押してください。';
    } finally {
      btn.innerHTML = '<i class="ti ti-sparkles"></i> 生成';
      btn.disabled = false;
    }
  }

  async function fetchWikipedia(keyword) {
    const result = await fetchPage(keyword);
    if (!result) throw new Error('「' + keyword + '」の文章が取得できませんでした。別のキーワードを試してください。');
    return result;
  }

  async function fetchPage(title) {
    const url = 'https://ja.wikipedia.org/w/api.php?action=query'
      + '&titles=' + encodeURIComponent(title)
      + '&prop=extracts&exintro=true&exsentences=4&redirects=1&format=json&origin=*';

    const res = await fetch(url);
    if (!res.ok) throw new Error('ネットワークエラーが発生しました。');

    const data = await res.json();
    const page = Object.values(data.query.pages)[0];
    if (page.missing !== undefined) return null;

    const redirected = page.title !== title;

    const div = document.createElement('div');
    div.innerHTML = page.extract;
    let text = (div.textContent || '').replace(/\s+/g, ' ').trim();

    // 括弧書きをすべて除去（読みがな・英語表記など）
    text = text.replace(/（[^）]*）/g, '');
    text = text.replace(/\(/g, '（').replace(/\)/g, '）');
    text = text.replace(/（[^）]*）/g, '');
    text = text.replace(/!/g, '！').replace(/\?/g, '？');
    text = text.replace(/([^\x00-\x7F])\s+([^\x00-\x7F])/g, '$1$2');
    text = text.replace(/\s+/g, ' ').trim();

    if (text.replace(/[。、\s]/g, '').length < 15) return null;

    if (text.length > 250) {
      const cut = text.indexOf('。', 100);
      text = cut !== -1 && cut < 280 ? text.slice(0, cut + 1) : text.slice(0, 200) + '。';
    }

    if (!text.endsWith('。')) text += '。';

    return { text, title: page.title, redirected };
  }

  /* ---- テキストのエスケープ ---- */
  function esc(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  /* ---- 読み上げ進捗の色付け ---- */
  function renderProgress(charIndex, charLen) {
    const t = currentText;
    const end = Math.min(charIndex + (charLen || 1), t.length);
    document.getElementById('text-box').innerHTML =
      '<span class="spoken">'   + esc(t.slice(0, charIndex)) + '</span>' +
      '<span class="speaking">' + esc(t.slice(charIndex, end)) + '</span>' +
      '<span class="unspoken">' + esc(t.slice(end)) + '</span>';
  }

  function resetTextDisplay() {
    if (currentText) document.getElementById('text-box').textContent = currentText;
  }

  /* ---- 速度ボタン ---- */
  function setSpeed(btn) {
    currentRate = parseFloat(btn.dataset.rate);
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (window.speechSynthesis.speaking) startSpeech();
  }

  /* ---- 音声読み上げ ---- */
  function startSpeech() {
    if (!currentText) return;
    stopSpeech();

    const utterance = new SpeechSynthesisUtterance(currentText);
    utterance.lang = 'ja-JP';
    utterance.rate = currentRate;

    utterance.onboundary = (e) => {
      if (e.name === 'word' || e.name === 'sentence') {
        renderProgress(e.charIndex, e.charLength);
      }
    };
    utterance.onstart = () => setStatus(true);
    utterance.onend   = () => { setStatus(false); resetTextDisplay(); };
    utterance.onerror = () => { setStatus(false); resetTextDisplay(); };

    window.speechSynthesis.speak(utterance);
  }

  function stopSpeech() {
    window.speechSynthesis.cancel();
    setStatus(false);
    resetTextDisplay();
  }

  function setStatus(playing) {
    const badge = document.getElementById('status-badge');
    const btn   = document.getElementById('btn-play');
    if (playing) {
      badge.textContent = '読み上げ中';
      badge.classList.add('playing');
      btn.innerHTML = '<i class="ti ti-player-play"></i> 読み上げ中…';
    } else {
      badge.textContent = '待機中';
      badge.classList.remove('playing');
      btn.innerHTML = '<i class="ti ti-player-play"></i> 読み上げ開始';
    }
  }

  /* ---- 再挑戦 ---- */
  function retryTyping() {
    stopSpeech();
    resetStats();
    document.getElementById('typing-box').value = '';
    document.getElementById('typing-box').focus();
  }

  /* ---- 入力終了 ---- */
  function finishTyping() {
    if (finished || !startTime) return;
    finished = true;
    clearInterval(timerInterval);

    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const typed = document.getElementById('typing-box').value;
    const chars = typed.length;
    const rate = currentText.length > 0
      ? Math.round(chars / currentText.length * 100) + '%'
      : '—';
    const wpm = elapsed > 0 ? Math.round(chars / (elapsed / 60)) : 0;

    document.getElementById('stat-chars').textContent = chars;
    document.getElementById('stat-rate').textContent = rate;
    document.getElementById('stat-wpm').textContent = wpm;
    document.getElementById('stat-time').textContent = fmt(elapsed);

    ['s-chars', 's-rate', 's-wpm', 's-time'].forEach(id => {
      document.getElementById(id).classList.add('finished');
    });

    document.getElementById('btn-finish').disabled = true;
    document.getElementById('btn-finish').innerHTML = '<i class="ti ti-check"></i> 終了しました';
  }

  /* ---- タイマー・統計 ---- */
  function startTimer() {
    finished = false;
    startTime = Date.now();
    timerInterval = setInterval(() => {
      if (finished) return;
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      document.getElementById('stat-time').textContent = fmt(elapsed);
      const typed = document.getElementById('typing-box').value;
      const len = typed.length;
      if (len > 0 && elapsed > 0) {
        document.getElementById('stat-wpm').textContent = Math.round(len / (elapsed / 60));
      }
      if (currentText.length > 0) {
        document.getElementById('stat-rate').textContent =
          Math.round(len / currentText.length * 100) + '%';
      }
    }, 1000);
  }

  function resetStats() {
    clearInterval(timerInterval);
    startTime = null;
    finished = false;
    document.getElementById('stat-chars').textContent = '0';
    document.getElementById('stat-rate').textContent = '—';
    document.getElementById('stat-wpm').textContent = '—';
    document.getElementById('stat-time').textContent = '0:00';
    ['s-chars', 's-rate', 's-wpm', 's-time'].forEach(id => {
      document.getElementById(id).classList.remove('finished');
    });
    const finBtn = document.getElementById('btn-finish');
    finBtn.disabled = false;
    finBtn.innerHTML = '<i class="ti ti-check"></i> 入力終了';
  }

  function updateStats() {
    if (finished) return;
    if (!startTime) startTimer();
    const typed = document.getElementById('typing-box').value;
    document.getElementById('stat-chars').textContent = typed.length;
    if (currentText.length > 0) {
      document.getElementById('stat-rate').textContent =
        Math.round(typed.length / currentText.length * 100) + '%';
    }
  }

  function fmt(sec) {
    return Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0');
  }

  /* ---- Enter キーで入力終了 ---- */
  document.getElementById('typing-box').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      finishTyping();
    }
  });
</script>

</body>
</html>
